<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Delta APK</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    font-family: Arial, sans-serif;
    color:white;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* particles */
#particles-js{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-1;
}

/* hiệu ứng vòng sáng khi chạm */
.touch-effect{
    position:fixed;
    border-radius:50%;
    pointer-events:none;
    border:2px solid white;
    width:20px;
    height:20px;
    animation:touch 0.6s ease-out forwards;
}

@keyframes touch{
    from{
        transform:scale(1);
        opacity:1;
    }
    to{
        transform:scale(8);
        opacity:0;
    }
}

h1{
    font-size:42px;
    margin-bottom:40px;
    text-shadow:0 0 15px rgba(255,255,255,0.7);
}

.download-btn{
    display:inline-block;
    padding:25px 50px;
    background:linear-gradient(45deg,#4facfe,#00f2fe);
    color:white;
    font-size:28px;
    font-weight:bold;
    text-decoration:none;
    border-radius:15px;
    box-shadow:0 0 25px rgba(79,172,254,0.9);
    transition:0.3s;
}

.download-btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 40px rgba(79,172,254,1);
}

</style>
</head>

<body>

<div id="particles-js"></div>

<h1>Script and Client by Quang Hieu</h1>

<a href="https://www.mediafire.com/file/5bqkohstfkajw91/delta-2711871-vn.apk/file"
class="download-btn"
target="_blank">
🚀 Download Delta APK
</a>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
particlesJS("particles-js",{
  particles:{
    number:{value:100},
    size:{value:4},
    move:{speed:2},
    opacity:{value:0.8},
    line_linked:{
        enable:true,
        distance:150,
        color:"#ffffff",
        opacity:0.5
    }
  },

  interactivity:{
    detect_on:"window",
    events:{
      onhover:{enable:true,mode:"repulse"},
      onclick:{enable:true,mode:"push"},
      resize:true
    },

    modes:{
      repulse:{distance:120},
      push:{particles_nb:15}
    }
  },

  retina_detect:true
});

/* hiệu ứng chạm */
document.addEventListener("click",function(e){

  let effect=document.createElement("div");
  effect.className="touch-effect";

  effect.style.left=e.clientX+"px";
  effect.style.top=e.clientY+"px";

  document.body.appendChild(effect);

  setTimeout(()=>{
    effect.remove();
  },600);

});
</script>

</body>
</html>
