/* ô link */
.link-box{
    width:95%;
    max-width:600px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);

    border-radius:18px;

    text-decoration:none;
    color:white;

    position:relative;
    overflow:hidden;

    transition:0.25s;

    box-shadow:0 0 15px rgba(255,255,255,0.1);
}

/* ánh sáng chạy */
.link-box::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:60%;
    height:100%;

    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.6),
        transparent
    );

    transform:skewX(-20deg);
}

/* hover */
.link-box:hover{
    transform:scale(1.03);
    box-shadow:
    0 0 20px rgba(255,255,255,0.3),
    0 0 40px rgba(0,200,255,0.4);
}

.link-box:hover::before{
    animation:shine 1s;
}

@keyframes shine{
    0%{ left:-120%; }
    100%{ left:120%; }
}

.title{
    font-size:20px;
    font-weight:bold;
}

.desc{
    font-size:15px;
    opacity:0.8;
