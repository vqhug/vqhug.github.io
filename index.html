<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Delta</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;

/* nền tối động */
background:linear-gradient(-45deg,#0f172a,#1e293b,#111827,#1f2937);
background-size:400% 400%;
animation:gradient 15s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.title{
font-size:32px;
font-weight:bold;
color:white;
margin-top:60px;
text-align:center;
}

.container{
width:90%;
max-width:600px;
margin-top:60px;
display:flex;
flex-direction:column;
gap:25px;
}

/* nút 3D rõ khối */
.box{
padding:26px;
text-align:center;
font-size:20px;
font-weight:600;
color:#222;
border-radius:14px;
text-decoration:none;

background:white;

/* cạnh dưới tạo khối */
box-shadow:
0 10px 0 #d4d4d4,
0 20px 40px rgba(0,0,0,0.45);

transition:all 0.15s ease;
}

/* hover nâng lên */
.box:hover{
transform:translateY(-4px);
box-shadow:
0 14px 0 #d4d4d4,
0 28px 50px rgba(0,0,0,0.55);
}

/* bấm lún xuống */
.box:active{
transform:translateY(8px);
box-shadow:
0 3px 0 #d4d4d4,
0 10px 20px rgba(0,0,0,0.35);
}

</style>
</head>

<body>

<div class="title">
Link Delta và Script By Quang Hieu
</div>

<div class="container">

<a class="box" href="https://www.mediafire.com/file/5bqkohstfkajw91/delta-2711871-vn%25282%2529.apk/file">
Link tải Delta
</a>

<a class="box" href="https://notevn.com/share/ew6nvfs7">
Tổng Hợp Mọi Script
</a>

</div>

</body>
</html>
