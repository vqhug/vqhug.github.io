<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Delta</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;

background:linear-gradient(-45deg,#0f172a,#1e293b,#111827,#1f2937);
background-size:400% 400%;
animation:gradient 15s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.title{
font-size:32px;
font-weight:bold;
color:white;
margin-top:60px;
text-align:center;
}

.container{
width:90%;
max-width:600px;
margin-top:60px;
display:flex;
flex-direction:column;
gap:25px;
}

/* ô kiểu nước */
.box{
position:relative;
padding:26px;
text-align:center;
font-size:20px;
font-weight:600;
color:white;
border-radius:18px;
text-decoration:none;

/* kính nước */
background:rgba(255,255,255,0.12);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);

/* viền nước */
border:1px solid rgba(255,255,255,0.25);

/* bóng chiều sâu */
box-shadow:
0 10px 25px rgba(0,0,0,0.45),
inset 0 1px 2px rgba(255,255,255,0.35);

transition:all 0.25s ease;
overflow:hidden;
}

/* ánh sáng phản chiếu */
.box::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:60%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.5),
transparent
);
transition:0.6s;
}

.box:hover::before{
left:120%;
}

/* hover nổi */
.box:hover{
transform:translateY(-6px);
box-shadow:
0 18px 40px rgba(0,0,0,0.6),
inset 0 1px 3px rgba(255,255,255,0.4);
}

/* bấm lún */
.box:active{
transform:translateY(3px) scale(0.98);
}

</style>
</head>

<body>

<div class="title">
Link Delta và Script By Quang Hieu
</div>

<div class="container">

<a class="box" href="https://www.mediafire.com/file/5bqkohstfkajw91/delta-2711871-vn%25282%2529.apk/file">
Link tải Delta
</a>

<a class="box" href="https://notevn.com/share/ew6nvfs7">
Tổng Hợp Mọi Script
</a>

</div>

</body>
</html>
