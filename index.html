<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Delta</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;

/* nền động */
background:linear-gradient(-45deg,#e3f2fd,#f5f7ff,#e0f7fa,#f3e5f5);
background-size:400% 400%;
animation:gradient 12s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.title{
font-size:32px;
font-weight:bold;
color:#333;
margin-top:60px;
text-align:center;
}

.container{
width:90%;
max-width:600px;
margin-top:60px;
display:flex;
flex-direction:column;
gap:25px;
}

/* ô 3D rõ khối */
.box{
padding:26px;
text-align:center;
font-size:20px;
font-weight:600;
color:#222;
border-radius:14px;
text-decoration:none;

background:white;

/* viền nhẹ */
border:1px solid rgba(0,0,0,0.08);

/* bóng tạo chiều sâu */
box-shadow:
0 8px 0 rgba(0,0,0,0.12),
0 18px 30px rgba(0,0,0,0.12);

transition:all 0.2s ease;
}

/* hover nâng lên */
.box:hover{
transform:translateY(-4px);
box-shadow:
0 12px 0 rgba(0,0,0,0.1),
0 25px 40px rgba(0,0,0,0.18);
}

/* bấm lún xuống */
.box:active{
transform:translateY(6px);
box-shadow:
0 2px 0 rgba(0,0,0,0.15),
0 8px 15px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div class="title">
Link Delta và Script By Quang Hieu
</div>

<div class="container">

<a class="box" href="https://www.mediafire.com/file/5bqkohstfkajw91/delta-2711871-vn%25282%2529.apk/file">
Link tải Delta
</a>

<a class="box" href="https://notevn.com/share/ew6nvfs7">
Tổng Hợp Mọi Script
</a>

</div>

</body>
</html>
